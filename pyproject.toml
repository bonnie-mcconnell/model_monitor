[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "model-monitor"
version = "0.1.0"
description = "Lightweight ML model monitoring and drift simulation system"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "pandas",
    "scikit-learn",
    "matplotlib",
    "streamlit",
    "joblib"
]

[tool.setuptools]
packages = [
    "training",
    "inference",
    "monitoring",
    "dashboard",
    "storage",
    "config",
    "data"
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]