# Behavioral contract for a customer support LLM.
#
# Each guarantee specifies what property must hold and what evaluator
# checks it. The severity determines how the policy responds to failures:
#   critical  - StrictBehaviorPolicy blocks the response immediately
#   high      - two or more high failures trigger a warning
#   low       - recorded for analysis but never triggers a block or warn
#
# Evaluator IDs must match exactly what is registered in the
# EvaluatorRegistry before running BehavioralContractRunner.

contract_id: support_response_v1
version: "1.0"
scope: customer_support_responses

guarantees:
  - id: valid_json
    description: >
      Every response must be valid JSON. Downstream systems parse the
      response programmatically; malformed JSON causes silent failures.
    severity: critical
    evaluator: json_validity

  - id: response_schema_v1
    description: >
      Response must conform to the SupportResponse schema: a ticket_id
      string and a response string, no additional fields. Extra fields
      indicate the model has started hallucinating structure.
    severity: critical
    evaluator: json_schema_support_v1

  - id: tone_consistency_v1
    description: >
      Response tone and style must remain consistent with our reference
      support responses. Significant drift here means a model update has
      changed the voice of our support function without a deliberate
      decision to do so.
    severity: high
    evaluator: tone_consistency_support_v1
