name: CI

on:
  push:
    branches: [main, behavior-monitoring]
  pull_request:
    branches: [main, behavior-monitoring]

jobs:
  quality:
    name: "Lint & type-check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/model_monitor/ tests/

  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create runtime directories
        # db.py creates these lazily, but creating them explicitly here makes
        # the intent obvious to anyone reading the CI log.
        run: mkdir -p data/metrics data/models data/reference

      - name: Test with coverage
        run: |
          pytest tests/ -v \
            --cov=model_monitor \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
