name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check the
        [behavior-monitoring branch](https://github.com/bonnie-mcconnell/model_monitor/tree/behavior-monitoring)
        — it may already be implemented there.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: >
        Describe the monitoring or operational gap this addresses.
        The best feature requests start from a concrete failure mode.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you rejected them.
